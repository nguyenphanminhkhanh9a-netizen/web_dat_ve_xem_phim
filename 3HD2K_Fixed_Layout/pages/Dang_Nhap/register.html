<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Đăng ký - 3HD2K Cinema</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <!-- Vanilla CSS -->
    <link rel="stylesheet" href="../../assets/css/dang_nhap.css?v=4">
</head>
<body>

    <header class="auth-header">
        <a class="auth-logo" href="../../index.html">3HD2K</a>
    </header>

    <main class="auth-main">
        <!-- Left Side: Banner (Hidden on Mobile) -->
        <div class="auth-banner">
            <div class="auth-banner-bg">
                <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=2025&auto=format&fit=crop" alt="Cinema Background">
            </div>
            <a href="../../index.html" class="back-home-link">
                <span class="material-symbols-outlined">arrow_back</span>
                Về trang chủ
            </a>
            <h1 class="auth-banner-title">
                Trải Nghiệm Điện Ảnh <br><span>Đỉnh Cao</span>
            </h1>
        </div>

        <!-- Right Side: Form Container -->
        <div class="auth-content">
            <div class="auth-box register-box">
                <!-- Tabs -->
                <div class="auth-tabs">
                    <a href="login.html" class="auth-tab">Đăng Nhập</a>
                    <a href="register.html" class="auth-tab active">Đăng Ký</a>
                </div>

                <!-- Error Banner (Global) -->
                <div id="form-error-banner" class="form-error-banner"></div>

                <!-- Form -->
                <form id="registerForm" class="auth-form" action="../../index.html" method="GET">
                    
                    <!-- Avatar Upload -->
                    <div style="text-align: center;">
                        <label style="font-size: 12px; color: var(--text-secondary); font-weight: 500;">Ảnh đại diện</label>
                        <div class="avatar-container mt-2">
                            <img id="registerAvatarPreview" class="avatar-preview" src="https://api.dicebear.com/7.x/bottts/svg?seed=3HD2K" alt="Avatar">
                            <label for="avatarInput" class="avatar-upload-btn">
                                <span class="material-symbols-outlined">add_a_photo</span>
                            </label>
                            <input type="file" id="avatarInput" accept="image/*" class="hidden">
                        </div>
                    </div>

                    <!-- Full Name -->
                    <div class="form-group">
                        <label for="fullname">Họ và tên</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-outlined">badge</span>
                            <input class="auth-input" type="text" id="fullname" name="fullname" placeholder="Nguyễn Văn A" required>
                        </div>
                    </div>

                    <!-- DOB & Phone Row -->
                    <div style="display: flex; gap: 10px;">
                        <div class="form-group" style="flex: 1;">
                            <label for="dob">Ngày sinh</label>
                            <div class="input-wrapper">
                                <span class="material-symbols-outlined">calendar_month</span>
                                <input class="auth-input" type="date" id="dob" name="dob" required>
                            </div>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label for="phone">Số điện thoại</label>
                            <div class="input-wrapper">
                                <span class="material-symbols-outlined">call</span>
                                <input class="auth-input" type="tel" id="phone" name="phone" placeholder="0987654321" required>
                            </div>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">Email</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-outlined">mail</span>
                            <input class="auth-input" type="email" id="email" name="email" placeholder="example@email.com" required>
                        </div>
                        <div id="email-error" class="inline-error">Email này đã tồn tại.</div>
                    </div>

                    <!-- Password Row -->
                    <div style="display: flex; gap: 10px;">
                        <div class="form-group" style="flex: 1;">
                            <label for="password">Mật khẩu</label>
                            <div class="input-wrapper">
                                <span class="material-symbols-outlined">lock</span>
                                <input class="auth-input has-toggle" type="password" id="password" placeholder="••••••••" required>
                                <span class="material-symbols-outlined password-toggle togglePasswordBtn" data-target="password" style="pointer-events: auto; z-index: 10;">visibility_off</span>
                            </div>
                            <div id="pwd-error" class="inline-error">Tối thiểu 6 ký tự.</div>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label for="confirm_password">Xác nhận MK</label>
                            <div class="input-wrapper">
                                <span class="material-symbols-outlined">lock</span>
                                <input class="auth-input has-toggle" type="password" id="confirm_password" placeholder="••••••••" required>
                                <span class="material-symbols-outlined password-toggle togglePasswordBtn" data-target="confirm_password" style="pointer-events: auto; z-index: 10;">visibility_off</span>
                            </div>
                            <div id="confirm-pwd-error" class="inline-error">Mật khẩu không khớp.</div>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn-submit">
                        Tạo Tài Khoản
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="auth-footer">
        <span class="footer-logo">3HD2K</span>
        <div class="footer-copy">© 2026 3HD2K Cinema. All rights reserved.</div>
    </footer>

    <script>
        // Avatar Upload Preview
        const avatarInput = document.getElementById('avatarInput');
        const preview = document.getElementById('registerAvatarPreview');

        avatarInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    localStorage.setItem('user_avatar', e.target.result);
                }
                reader.readAsDataURL(file);
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            localStorage.removeItem('user_avatar');
        });

        // Password Visibility Toggles
        const toggleBtns = document.querySelectorAll('.togglePasswordBtn');
        toggleBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const targetInput = document.getElementById(targetId);
                const type = targetInput.getAttribute('type') === 'password' ? 'text' : 'password';
                targetInput.setAttribute('type', type);
                this.textContent = type === 'password' ? 'visibility_off' : 'visibility';
            });
        });

        // Form Submission Logic
        const registerForm = document.getElementById('registerForm');
        
        // Input Fields
        const emailInput = document.getElementById('email');
        const pwdInput = document.getElementById('password');
        const confirmPwdInput = document.getElementById('confirm_password');
        
        // Error Messages
        const emailError = document.getElementById('email-error');
        const pwdError = document.getElementById('pwd-error');
        const confirmPwdError = document.getElementById('confirm-pwd-error');
        const errorBanner = document.getElementById('form-error-banner');

        // Helper function to hide errors on input
        [emailInput, pwdInput, confirmPwdInput].forEach(input => {
            input.addEventListener('input', function() {
                this.classList.remove('error');
                errorBanner.classList.remove('show');
                const errElement = document.getElementById(this.id + '-error') || 
                                   (this.id === 'password' ? pwdError : confirmPwdError);
                if(errElement) errElement.classList.remove('show');
            });
        });

        registerForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Reset errors
            emailInput.classList.remove('error');
            pwdInput.classList.remove('error');
            confirmPwdInput.classList.remove('error');
            emailError.classList.remove('show');
            pwdError.classList.remove('show');
            confirmPwdError.classList.remove('show');
            errorBanner.classList.remove('show');

            const fullname = document.getElementById('fullname').value.trim();
            const email = emailInput.value.trim();
            const password = pwdInput.value;
            const confirmPassword = confirmPwdInput.value;
            const dob = document.getElementById('dob').value;
            const phone = document.getElementById('phone').value.trim();
            const avatar = localStorage.getItem('user_avatar') || 'https://i.pravatar.cc/150?img=11';

            let isValid = true;

            // Validation: Password length
            if (password.length < 6) {
                pwdInput.classList.add('error');
                pwdError.textContent = "Tối thiểu 6 ký tự.";
                pwdError.classList.add('show');
                isValid = false;
            }

            // Validation: Confirm Password match
            if (password !== confirmPassword) {
                confirmPwdInput.classList.add('error');
                confirmPwdError.textContent = "Mật khẩu không khớp.";
                confirmPwdError.classList.add('show');
                isValid = false;
            }

            // Lấy danh sách users cũ
            let users = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
            
            // Validation: Email Exists
            const exists = users.find(u => u.email === email);
            if (exists) {
                emailInput.classList.add('error');
                emailError.textContent = "Email này đã được đăng ký! Hãy Đăng nhập.";
                emailError.classList.add('show');
                isValid = false;
            }

            if (!isValid) return;

            // Thêm user mới
            users.push({ fullname, email, password, dob, phone, avatar });
            localStorage.setItem('registeredUsers', JSON.stringify(users));

            // Tự động đăng nhập
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userName', fullname);
            localStorage.setItem('userEmail', email);
            localStorage.setItem('userAvatar', avatar);

            // Chuyển hướng
            window.location.href = '../../index.html';
        });
    </script>
</body>
</html>
